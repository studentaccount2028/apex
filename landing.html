<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APEX Society</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Condiment&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            neon:  '#6FFF00',
            cream: '#EFF4FF',
          },
          fontFamily: {
            grotesk:   ['Anton', 'sans-serif'],
            condiment: ['Condiment', 'cursive'],
          },
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background-color: #010828; color: #EFF4FF; }

    .liquid-glass {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.45)  0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0)    40%,
        rgba(255,255,255,0)    60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">

    const NFT_CARDS = [
      { video: 'https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260331_053923_22c0a6a5-313c-474c-85ff-3b50d25e944a.mp4', score: '8.7/10' },

      { video: 'https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260331_055427_ac7035b5-9f3b-4289-86fc-941b2432317d.mp4', score: '8.2/10' },
    ];

    /* ─── App ────────────────────────────────────────────────── */
    function App() {
      return (

          {/* Texture overlay */}
          <div
            className="fixed inset-0 z-50 pointer-events-none"
            style={{ backgroundImage: 'url(/texture.png)', backgroundSize: 'cover', mixBlendMode: 'lighten', opacity: 0.6 }}
          />

          {/* ══════════════════════════════════════════
              SECTION 1 — HERO
          ══════════════════════════════════════════ */}
          <section className="relative min-h-screen overflow-hidden rounded-b-[32px]">

              autoPlay loop muted playsInline
            />

            <div className="relative z-10 max-w-[1831px] mx-auto px-6 lg:px-12 flex flex-col min-h-screen">

              {/* ── Navbar ── */}
              <header className="flex items-center justify-between pt-8">
                <span className="font-grotesk text-[16px] uppercase text-cream tracking-wide">
                  APEX Society
                </span>

                <nav className="hidden lg:block liquid-glass rounded-[28px] px-[52px] py-[24px]">
                  <div className="flex items-center gap-10">
                    {['Homepage','Gallery','Buy NFT','FAQ','Contact'].map(l => (
                      <a key={l} href="#"

                </nav>

                    <h1
                      className="font-grotesk text-[40px] sm:text-[60px] md:text-[75px] lg:text-[90px]
                                 uppercase leading-[1.05] lg:leading-[1] text-cream"
                      style={{ maxWidth: 780 }}
                    >
                      APEX Cup<br />Startup Competition
                    </h1>
                    {/* Cursive accent — right of heading */}

                                 text-neon mix-blend-exclusion opacity-90 -rotate-1
                                 pointer-events-none select-none whitespace-nowrap"
                    >

                    </span>
                  </div>

                </div>
              </div>

            </div>
          </section>

          {/* ══════════════════════════════════════════
              SECTION 2 — ABOUT / INTRO
          ══════════════════════════════════════════ */}
          <section className="relative min-h-screen overflow-hidden">
            <video
              className="absolute inset-0 w-full h-full object-cover"
              src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260331_151551_992053d1-3d3e-4b8c-abac-45f22158f411.mp4"
              autoPlay loop muted playsInline
            />

            <div className="relative z-10 max-w-[1831px] mx-auto px-6 lg:px-12
                            py-16 lg:py-24 flex flex-col min-h-screen justify-between">

              {/* ── Top row ── */}
              <div className="flex flex-col lg:flex-row items-start justify-between gap-8 lg:gap-16">

                {/* Left: heading + APEX cursive */}
                <div className="relative">
                  <h2 className="font-grotesk text-[32px] sm:text-[45px] md:text-[55px] lg:text-[60px]
                                 uppercase leading-tight text-cream">

                    <span className="font-condiment normal-case text-neon">VC</span>

                </h2>

                {/* Right: SEE ALL CREATORS */}
                <div className="flex flex-col items-start cursor-pointer group">

                      SEE
                    </span>
                    <div className="flex flex-col">
                      <span className="font-grotesk text-[20px] sm:text-[28px] md:text-[32px] lg:text-[36px]

                      <span className="font-grotesk text-[20px] sm:text-[28px] md:text-[32px] lg:text-[36px]
                                       uppercase text-cream leading-none">CREATORS</span>
                    </div>
                  </div>
                  {/* Neon underbar */}

              </div>

              {/* ── Card grid ── */}
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                {NFT_CARDS.map((card, i) => (
                  <div key={i}
                       className="liquid-glass rounded-[32px] p-[18px]
                                  hover:bg-white/10 transition-colors duration-200 cursor-pointer">
                    {/* Square video */}
                    <div className="relative pb-[100%] rounded-[24px] overflow-hidden">
                      <video
                        className="absolute inset-0 w-full h-full object-cover"
                        src={card.video}
                        autoPlay loop muted playsInline
                      />
                    </div>
                    {/* Score bar */}
                    <div className="liquid-glass rounded-[20px] px-5 py-4 mt-3
                                    flex items-center justify-between">
                      <div>
                        <p className="font-mono text-[11px] uppercase text-cream/70">RARITY SCORE:</p>
                        <p className="font-mono text-[16px] text-cream">{card.score}</p>
                      </div>
                      <button
                        className="w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0
                                   shadow-lg shadow-purple-500/50 hover:scale-110 transition-transform duration-200"
                        style={{ background: 'linear-gradient(135deg, #b724ff, #7c3aed)' }}
                      >
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                             stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                          <path d="m9 18 6-6-6-6"/>
                        </svg>
                      </button>
                    </div>
                  </div>
                ))}
              </div>

            </div>
          </section>

          {/* ══════════════════════════════════════════
              SECTION 4 — CTA / FINAL
          ══════════════════════════════════════════ */}
          <section className="relative" style={{ backgroundColor: '#010828' }}>
            {/* Video at native aspect ratio */}
            <video
              className="w-full h-auto block"
              src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260331_055729_72d66327-b59e-4ae9-bb70-de6ccb5ecdb0.mp4"
              autoPlay loop muted playsInline
            />

            {/* Text overlay — right aligned */}
            <div className="absolute inset-0 flex items-center justify-end
                            px-6 lg:pl-[15%] lg:pr-[20%]">
              <div className="relative text-right">
                {/* "Go beyond" cursive — absolute top-left of block */}
                <span
                  className="absolute -top-8 sm:-top-12 md:-top-16 lg:-top-20 left-0
                             font-condiment text-[17px] sm:text-[30px] md:text-[50px] lg:text-[68px]
                             text-neon mix-blend-exclusion opacity-90
                             pointer-events-none select-none whitespace-nowrap"
                >
                  Go beyond
                </span>

                <h2 className="font-grotesk text-[16px] sm:text-[28px] md:text-[45px] lg:text-[60px]
                               uppercase leading-tight text-cream">
                  <div className="mb-4 sm:mb-6 lg:mb-12">JOIN US.</div>
                  <div>REVEAL WHAT&#39;S HIDDEN.</div>
                  <div>DEFINE WHAT&#39;S NEXT.</div>
                  <div>FOLLOW THE SIGNAL.</div>

              </div>
            </div>


          </section>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
