<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>APEX Capital Society — Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#09090e;--ink2:#111118;--ink3:#1a1a24;--ink4:#222230;--surface:#f4f3ef;--surface2:#eceae5;--surface3:#e2e0da;--surface4:#d8d5ce;--white:#ffffff;--gold:#c9aa71;--gold2:#a88b52;--gold3:#e8d4a8;--gold-bg:rgba(201,170,113,0.08);--text1:#09090e;--text2:#2d2d3a;--text3:#5a5a6e;--text4:#8a8a9e;--text5:#b0b0c0;--border:#dbd8d0;--border2:#c8c4bb;--border-dark:rgba(255,255,255,0.07);--green:#1d6348;--green-bg:rgba(29,99,72,0.07);--red:#8b2233;--red-bg:rgba(139,34,51,0.07);--blue:#1a3a5c;--blue-bg:rgba(26,58,92,0.07);--f-display:'DM Serif Display',serif;--f-body:'DM Sans',sans-serif;--f-mono:'JetBrains Mono',monospace;--nav-h:56px;--sidebar-w:272px;--ease:cubic-bezier(0.16,1,0.3,1)}
html{scroll-behavior:smooth}body{font-family:var(--f-body);background:var(--surface);color:var(--text1);line-height:1.6;font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
button{font-family:var(--f-body)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.au{animation:fadeUp .5s var(--ease) both}.au1{animation-delay:.05s}.au2{animation-delay:.12s}.au3{animation-delay:.2s}.au4{animation-delay:.28s}
.ai{animation:fadeIn .4s ease both}
.nav{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(9,9,14,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border-dark)}
.nav-brand{display:flex;align-items:center;gap:9px;cursor:pointer}
.nav-mark{width:26px;height:26px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:var(--f-display);font-size:13px;color:var(--ink);font-weight:700;flex-shrink:0}
.nav-name{font-size:12px;font-weight:600;color:#fff;letter-spacing:.06em;text-transform:uppercase}
.nav-link{background:none;border:none;cursor:pointer;font-size:11px;font-weight:500;color:rgba(255,255,255,.45);padding:5px 11px;border-radius:2px;letter-spacing:.04em;text-transform:uppercase;transition:color .2s,background .2s}
.nav-link:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.05)}
.nav-link.active{color:var(--gold)}
.app-shell{display:flex;min-height:100vh;padding-top:var(--nav-h)}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--ink);border-right:1px solid var(--border-dark);display:flex;flex-direction:column;position:fixed;top:var(--nav-h);left:0;bottom:0;overflow-y:auto;z-index:100}
.sidebar-head{padding:20px 18px 16px;border-bottom:1px solid var(--border-dark);flex-shrink:0}
.sidebar-head-label{font-family:var(--f-mono);font-size:9px;color:rgba(255,255,255,.28);letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px}
.sidebar-bar-track{height:2px;background:rgba(255,255,255,.08);border-radius:1px;margin-bottom:6px}
.sidebar-bar-fill{height:100%;background:var(--gold);border-radius:1px;transition:width .6s var(--ease)}
.sidebar-bar-stats{display:flex;justify-content:space-between;font-family:var(--f-mono);font-size:9px;color:rgba(255,255,255,.28);letter-spacing:.06em}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border-dark);flex-shrink:0}
.sidebar-tab{flex:1;padding:10px 0;background:none;border:none;cursor:pointer;font-family:var(--f-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.sidebar-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.sidebar-scroll{flex:1;overflow-y:auto;padding:8px 0}
.lesson-item{display:flex;align-items:flex-start;gap:9px;padding:7px 18px 7px 16px;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .15s}
.lesson-item:hover{background:rgba(255,255,255,.03)}
.lesson-item.active{background:rgba(201,170,113,.07)}
.lesson-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;border:1px solid rgba(255,255,255,.18);transition:all .2s}
.lesson-dot.done{background:var(--gold);border-color:var(--gold)}
.lesson-dot.cur{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,170,113,.2)}
.lesson-item-name{font-size:11px;color:rgba(255,255,255,.4);line-height:1.4}
.lesson-item.active .lesson-item-name{color:rgba(255,255,255,.75)}
.lesson-item.done-item .lesson-item-name{color:rgba(255,255,255,.5)}
.lesson-item-time{font-family:var(--f-mono);font-size:9px;color:rgba(255,255,255,.2);letter-spacing:.04em;margin-top:2px}
.gloss-search{padding:10px 12px;border-bottom:1px solid var(--border-dark)}
.gloss-search input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;font-family:var(--f-body);font-size:12px;padding:7px 10px;border-radius:2px;outline:none}
.gloss-search input::placeholder{color:rgba(255,255,255,.25)}
.gloss-search input:focus{border-color:rgba(201,170,113,.4)}
.gloss-letter{padding:6px 18px 2px;font-family:var(--f-mono);font-size:9px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase}
.gloss-term{padding:8px 18px;border-bottom:1px solid rgba(255,255,255,.04)}
.gloss-term-word{font-size:11px;font-weight:600;color:rgba(255,255,255,.65);margin-bottom:3px}
.gloss-term-def{font-size:10px;color:rgba(255,255,255,.32);line-height:1.5;font-weight:300}
.content-area{margin-left:var(--sidebar-w);flex:1;min-height:calc(100vh - var(--nav-h))}
.lesson-view{max-width:840px;margin:0 auto;padding:52px 48px 80px}
.l-breadcrumb{font-family:var(--f-mono);font-size:9px;color:var(--text5);letter-spacing:.1em;text-transform:uppercase;margin-bottom:28px;display:flex;align-items:center;gap:7px}
.l-breadcrumb span{color:var(--text4)}
.l-title{font-family:var(--f-display);font-size:clamp(24px,3.5vw,38px);color:var(--text1);line-height:1.18;margin-bottom:10px}
.l-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--border)}
.l-tag{font-size:10px;font-weight:500;padding:3px 9px;background:var(--surface3);color:var(--text4);border-radius:2px;letter-spacing:.04em;text-transform:uppercase}
.l-tag.gold{background:var(--gold-bg);color:var(--gold2)}
.l-tag.green{background:var(--green-bg);color:var(--green)}
.l-readtime{font-family:var(--f-mono);font-size:10px;color:var(--text5)}
.l-hook{background:var(--ink);padding:26px 30px;margin-bottom:36px;border-left:3px solid var(--gold)}
.l-hook-label{font-family:var(--f-mono);font-size:9px;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px}
.l-hook-text{font-size:14px;color:rgba(255,255,255,.78);line-height:1.7;font-style:italic;font-weight:300}
.l-sec-h{font-family:var(--f-display);font-size:21px;color:var(--text1);margin:36px 0 14px}
.l-body{font-size:14px;color:var(--text2);line-height:1.82;font-weight:300;margin-bottom:16px}
.l-body strong{color:var(--text1);font-weight:600}
.l-callout{border:1px solid var(--border);background:#fff;padding:20px 24px;margin:20px 0;display:flex;gap:14px}
.l-callout-bar{width:3px;background:var(--gold);flex-shrink:0;border-radius:1px}
.l-callout-content{flex:1}
.l-callout-label{font-family:var(--f-mono);font-size:9px;color:var(--gold2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px}
.l-callout-text{font-size:13px;color:var(--text2);line-height:1.7;font-weight:300}
.l-callout-text strong{color:var(--text1);font-weight:600}
.l-formula{background:var(--ink);border:1px solid var(--border-dark);padding:18px 22px;margin:16px 0;font-family:var(--f-mono);font-size:13px;color:var(--gold3);letter-spacing:.03em;line-height:1.8}
.l-list{list-style:none;margin:12px 0 20px;border:1px solid var(--border)}
.l-list li{padding:11px 18px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);display:flex;align-items:flex-start;gap:11px;line-height:1.6;font-weight:300}
.l-list li:last-child{border-bottom:none}

.l-steps{list-style:none;margin:12px 0 20px;counter-reset:step}
.l-steps li{counter-increment:step;display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);line-height:1.6;font-weight:300}
.l-steps li::before{content:counter(step);font-family:var(--f-mono);font-size:10px;color:var(--gold);background:var(--ink);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.l-table{width:100%;border-collapse:collapse;margin:16px 0 28px;font-size:12px}

.l-table td{padding:10px 14px;border:1px solid var(--border);color:var(--text2);font-weight:300;vertical-align:top}

.l-example{background:#fff;border:1px solid var(--border);padding:24px 26px;margin:18px 0}
.l-example-label{font-family:var(--f-mono);font-size:9px;color:var(--text4);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}

.l-example-body{font-size:13px;color:var(--text2);line-height:1.75;font-weight:300}
.l-example-body strong{color:var(--text1);font-weight:600}
.l-terms{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0 24px}
.l-term{background:#fff;border:1px solid var(--border);padding:14px 16px}
.l-term-word{font-size:12px;font-weight:600;color:var(--text1);margin-bottom:4px}
.l-term-def{font-size:11px;color:var(--text4);line-height:1.55;font-weight:300}
.quiz-wrap{margin:36px 0;border:1px solid var(--border);background:#fff;overflow:hidden}
.quiz-head{background:var(--ink);padding:14px 22px;display:flex;align-items:center;justify-content:space-between}
.quiz-head-title{font-family:var(--f-mono);font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.1em;text-transform:uppercase}
.quiz-head-score{font-family:var(--f-mono);font-size:10px;color:var(--gold)}
.quiz-q{padding:24px 22px;border-bottom:1px solid var(--border)}.quiz-q:last-child{border-bottom:none}
.quiz-qn{font-family:var(--f-mono);font-size:9px;color:var(--text5);letter-spacing:.1em;margin-bottom:8px}

.quiz-opts{display:flex;flex-direction:column;gap:7px}

.quiz-opt.sc{border-color:var(--green)!important;background:var(--green-bg)!important;color:var(--green)!important}

.quiz-opt:disabled{cursor:default}
.quiz-letter{width:20px;height:20px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--text4);flex-shrink:0;font-family:var(--f-mono);margin-top:1px}
.quiz-fb{font-size:11px;margin-top:10px;padding:8px 12px;border-radius:2px;font-weight:400;line-height:1.6}

.quiz-fb.no{background:var(--red-bg);color:var(--red)}
.l-foot{margin-top:44px;padding-top:28px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.btn-complete{background:var(--ink);color:#fff;border:none;cursor:pointer;font-family:var(--f-body);font-size:11px;font-weight:600;padding:11px 24px;border-radius:2px;letter-spacing:.06em;text-transform:uppercase;transition:background .2s;display:flex;align-items:center;gap:7px}
.btn-complete:hover{background:var(--ink3)}.btn-complete.done{background:var(--green);cursor:default}
.btn-next-l{background:var(--gold);color:var(--ink);border:none;cursor:pointer;font-family:var(--f-body);font-size:11px;font-weight:700;padding:11px 24px;border-radius:2px;letter-spacing:.06em;text-transform:uppercase;transition:background .2s}
.btn-next-l:hover{background:#d8be88}
.cat-hero{background:var(--ink);padding:72px 64px 60px;position:relative;overflow:hidden}
.cat-hero-grid{position:absolute;inset:0;opacity:.03;background-image:linear-gradient(rgba(201,170,113,.8) 1px,transparent 1px),linear-gradient(90deg,rgba(201,170,113,.8) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.ch-tag{font-family:var(--f-mono);font-size:9px;color:var(--gold);letter-spacing:.14em;text-transform:uppercase;margin-bottom:16px}
.ch-h1{font-family:var(--f-display);font-size:clamp(32px,4.5vw,58px);color:#fff;line-height:1.08;margin-bottom:14px;letter-spacing:-.015em;max-width:680px}

.ch-sub{font-size:14px;color:rgba(255,255,255,.45);max-width:480px;line-height:1.7;font-weight:300;margin-bottom:36px}
.ch-stats{display:flex;gap:44px}

.chs-l{font-size:10px;color:rgba(255,255,255,.28);letter-spacing:.08em;text-transform:uppercase}
.track-sel{background:var(--surface2);border-bottom:1px solid var(--border)}
.track-sel-label{padding:20px 64px 0;font-family:var(--f-mono);font-size:9px;color:var(--text4);letter-spacing:.14em;text-transform:uppercase}
.track-tabs{display:flex;padding:0 64px;overflow-x:auto}

.thd-h2{font-family:var(--f-display);font-size:clamp(20px,2.8vw,28px);color:var(--text1);margin-bottom:7px}

.clist{border:1px solid var(--border);display:flex;flex-direction:column}

.cring-svg{transform:rotate(-90deg)}
.cring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-size:9px;font-weight:500}

async function fetchLesson(id){
  if(lessonCache[id])return lessonCache[id];
  const file=lessonFileMap[id];
  if(!file){console.warn('No file mapped for lesson:',id);return null;}
  if(!lessonCache['__file__'+file]){
    try{
      const res=await fetch(file);
      if(!res.ok)throw new Error('HTTP '+res.status+' loading '+file);
      const data=await res.json();
      Object.keys(data).forEach(k=>{lessonCache[k]=data[k];});
      lessonCache['__file__'+file]=true;
    }catch(e){
      console.error('Error loading lesson data:',e);
      return null;
    }
  }
  return lessonCache[id]||null;
}

// ─── UPGRADED SPREADSHEET-STYLE DCF MODEL ─────────────────────────────────────
function DCFModel({companyName}){
  const defaults={
    baseRev:500, g:[18,16,14,12,10],
    ebitMargin:[22,22,22,22,22], taxRate:25,
    capexPct:8, nwcPct:3,
    wacc:9.5, termGrowth:3.0,
    shares:85, netDebt:200, curPrice:32.00
  };
  const [inp,setInp]=React.useState({...defaults});
  const [showOrientation,setShowOrientation]=React.useState(false);
  const [showFormulas,setShowFormulas]=React.useState(false);
  const [showSens,setShowSens]=React.useState(true);
  const [hover,setHover]=React.useState(null);
  const [activeCell,setActiveCell]=React.useState(null);

  function upd(path,val){
    const n=parseFloat(val);
    if(isNaN(n))return;
    setInp(p=>{
      const next={...p};
      if(Array.isArray(path)){
        const arr=[...next[path[0]]];
        arr[path[1]]=n;
        next[path[0]]=arr;
      } else {
        next[path]=n;
      }
      return next;
    });
  }

  // ── COMPUTE ──
  const model=React.useMemo(()=>{
    const {baseRev,g,ebitMargin,taxRate,capexPct,nwcPct,wacc,termGrowth,shares,netDebt}=inp;
    const w=wacc/100, tg=termGrowth/100, tax=taxRate/100;
    const cp=capexPct/100, nw=nwcPct/100;

    let revs=[baseRev], ebit=[], nopat=[], capex=[], dwc=[], fcf=[], df=[], pvFcf=[];
    for(let i=0;i<5;i++){
      const rev=revs[i]*(1+g[i]/100);
      revs.push(rev);
      const eb=rev*(ebitMargin[i]/100);
      const np=eb*(1-tax);
      const cx=rev*cp;
      const wc=rev*nw;
      const fc=np-cx-wc;
      const d=1/Math.pow(1+w,i+1);
      ebit.push(eb);
      nopat.push(np);
      capex.push(cx);
      dwc.push(wc);
      fcf.push(fc);
      df.push(d);
      pvFcf.push(fc*d);
    }

    const lastFcf=fcf[4];
    const tv=lastFcf*(1+tg)/(w-tg);
    const pvTv=tv*df[4];
    const sumPvFcf=pvFcf.reduce((a,b)=>a+b,0);
    const ev=sumPvFcf+pvTv;
    const eqVal=ev-netDebt;
    const ivps=eqVal/shares;
    const tvPctEV=pvTv/ev*100;
    const upside=(ivps-inp.curPrice)/inp.curPrice*100;
    const revGrowthY5=revs[5];
    const impliedRevCAGR=(Math.pow(revGrowthY5/baseRev,1/5)-1)*100;

    return{revs,ebit,nopat,capex,dwc,fcf,df,pvFcf,tv,pvTv,sumPvFcf,ev,eqVal,ivps,tvPctEV,upside,impliedRevCAGR};
  },[inp]);

  // ── SENSITIVITY ──
  const sensData=React.useMemo(()=>{
    const wRange=[-2,-1,-0.5,0,0.5,1,2].map(d=>inp.wacc+d);
    const tgRange=[-1.5,-1,-0.5,0,0.5,1,1.5].map(d=>inp.termGrowth+d);
    return{wRange,tgRange,grid:wRange.map(w=>{
      const wi=w/100;
      return tgRange.map(tg=>{
        if(tg/100>=wi)return null;
        const lastFcf=model.fcf[4];
        const tv2=lastFcf*(1+tg/100)/(wi-tg/100);
        const pvTv2=tv2*model.df[4]*(Math.pow(1+inp.wacc/100,5)/Math.pow(1+wi,5));
        // Recompute PV of FCFs with new WACC
        let spv=0;
        for(let i=0;i<5;i++){spv+=model.fcf[i]/Math.pow(1+wi,i+1);}
        const pvTvNew=tv2/Math.pow(1+wi,5);
        const evN=spv+pvTvNew;
        const eqN=evN-inp.netDebt;
        return(eqN/inp.shares);
      });
    })};
  },[inp,model]);

  // ── FORMATTING ──
  const fM=(n)=>n>=1000?`$${(n/1000).toFixed(1)}B`:n>=0?`$${n.toFixed(1)}M`:`($${Math.abs(n).toFixed(1)}M)`;
  const fB=(n)=>`$${(n/1000).toFixed(2)}B`;
  const fP=(n)=>`${n.toFixed(1)}%`;
  const fS=(n)=>`$${n.toFixed(2)}`;
  const fX=(n)=>`${n.toFixed(3)}x`;

  const BLUE='#1e40af';
  const BLUE_BG='rgba(37,99,235,.06)';
  const BLUE_BORDER='rgba(37,99,235,.25)';
  const HD_BG='#09090e';
  const SEC_BG='#f1f0ec';
  const ROW_ALT='rgba(248,247,244,.6)';

  const TOOLTIPS={
    rev:'Revenue = Prior Year Revenue × (1 + Growth Rate). The top line of the business.',
    gRate:'Revenue growth rate — how fast the company is growing year over year.',
    ebit:'EBIT = Revenue × EBIT Margin. Operating profit before interest and taxes.',
    ebitM:'EBIT Margin — operating profitability as a percentage of revenue.',
    nopat:'NOPAT = EBIT × (1 − Tax Rate). Net Operating Profit After Tax.',
    capex:'Capital Expenditure = Revenue × CapEx %. Investment in long-lived assets.',
    dwc:'Change in Net Working Capital = Revenue × NWC %. Cash tied up in operations.',
    fcf:'Free Cash Flow = NOPAT − CapEx − ΔNWC. Cash available to all capital providers.',
    df:'Discount Factor = 1/(1+WACC)^n. Converts future cash to present value.',
    pvFcf:'PV of FCF = FCF × Discount Factor. What each year\'s cash flow is worth today.',
    tv:'Terminal Value = FCF₅×(1+g)/(WACC−g). Value of all cash flows beyond Year 5.',
    pvTv:'PV of Terminal Value = TV/(1+WACC)⁵. Terminal value in today\'s dollars.',
    ev:'Enterprise Value = Σ PV of FCFs + PV of Terminal Value. Total business value.',
    eqVal:'Equity Value = Enterprise Value − Net Debt. Value belonging to shareholders.',
    ivps:'Implied Share Price = Equity Value / Shares Outstanding.',
  };
  const FORMULAS={
    rev:'= Prior Year Rev × (1 + Growth %)',
    ebit:'= Revenue × EBIT Margin %',
    nopat:'= EBIT × (1 − Tax Rate)',
    capex:'= Revenue × CapEx %',
    dwc:'= Revenue × NWC %',
    fcf:'= NOPAT − CapEx − ΔNWC',
    df:'= 1 / (1 + WACC)^Year',
    pvFcf:'= FCF × Discount Factor',
  };

  // ── CELL COMPONENTS ──
  function EditCell({value,field,idx,min=-100,max=100,step=0.5,suffix='',prefix=''}){
    const key=idx!==undefined?`${field}_${idx}`:field;
    const isActive=activeCell===key;
    const path=idx!==undefined?[field,idx]:field;
    // Validation
    let invalid=false, errMsg='';
    if(field==='wacc'&&value>30){invalid=true;errMsg='Max 30%';}
    if(field==='termGrowth'&&value>=inp.wacc){invalid=true;errMsg='Must be < WACC';}
    if((field==='g')&&Math.abs(value)>100){invalid=true;errMsg='Max ±100%';}
    return(
      <td onClick={()=>setActiveCell(key)} style={{
        background:BLUE_BG, color:invalid?'#dc2626':BLUE, fontWeight:600,
        fontFamily:'var(--f-mono)', fontSize:'11px', padding:'5px 8px',
        cursor:'pointer', minWidth:'68px', textAlign:'right',
        outline:isActive?`2px solid ${BLUE}`:invalid?'2px solid #dc2626':'1px solid '+BLUE_BORDER,
        outlineOffset:'-1px', position:'relative', whiteSpace:'nowrap'
      }}>
        {isActive?(
          <input type="number" value={value} min={min} max={max} step={step}
            autoFocus
            onChange={e=>upd(path,e.target.value)}
            onBlur={()=>setActiveCell(null)}
            onKeyDown={e=>{if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();setActiveCell(null);}}}
            style={{width:'52px',border:'none',background:'transparent',color:BLUE,
              fontFamily:'var(--f-mono)',fontSize:'11px',fontWeight:600,
              textAlign:'right',outline:'none'}}/>
        ):(
          <span>{prefix}{typeof value==='number'?value.toFixed(1):value}{suffix}</span>
        )}
        {invalid&&!isActive&&<div style={{position:'absolute',bottom:'-14px',right:'2px',fontSize:'8px',color:'#dc2626',whiteSpace:'nowrap'}}>{errMsg}</div>}
      </td>
    );
  }

  function OutCell({value,highlight,bold,dim}){
    return(
      <td style={{
        color:highlight?'#059669':dim?'var(--text4)':'var(--text1)',
        fontFamily:'var(--f-mono)', fontSize:'11px', padding:'5px 8px',
        textAlign:'right', fontWeight:bold?700:400, whiteSpace:'nowrap',
        background:highlight?'rgba(5,150,105,.03)':'transparent'
      }}>{value}</td>
    );
  }

  function LabelCell({text,tooltip,formula,indent}){
    const tt=tooltip&&TOOLTIPS[tooltip];
    const fm=formula&&showFormulas&&FORMULAS[formula];
    return(
      <td style={{
        padding:`5px 8px 5px ${indent?'24px':'8px'}`, fontSize:'11px',
        color:'var(--text2)', whiteSpace:'nowrap', position:'relative',
        fontWeight:indent?300:400, minWidth:'200px'
      }}
        onMouseEnter={()=>tt&&setHover(tooltip)}
        onMouseLeave={()=>setHover(null)}>
        <span>{text}</span>
        {fm&&<span style={{marginLeft:'8px',fontSize:'9px',color:'var(--text5)',fontFamily:'var(--f-mono)'}}>{fm}</span>}
        {hover===tooltip&&tt&&(
          <div style={{position:'absolute',left:'0',bottom:'100%',background:'var(--ink)',color:'rgba(255,255,255,.85)',padding:'8px 12px',fontSize:'10px',lineHeight:'1.5',maxWidth:'280px',zIndex:20,borderRadius:'2px',fontFamily:'var(--f-body)',fontWeight:300,boxShadow:'0 4px 16px rgba(0,0,0,.3)',whiteSpace:'normal'}}>{tt}</div>
        )}
      </td>
    );
  }

  function SectionHeader({text,cols}){
    return(
      <tr><td colSpan={cols} style={{
        padding:'6px 8px', background:HD_BG, color:'rgba(255,255,255,.55)',
        fontFamily:'var(--f-mono)', fontSize:'9px', letterSpacing:'.12em',
        textTransform:'uppercase', fontWeight:600, borderBottom:'1px solid var(--border-dark)'
      }}>{text}</td></tr>
    );
  }

  const years=['Base','Year 1','Year 2','Year 3','Year 4','Year 5'];
  const yrsOnly=['Year 1','Year 2','Year 3','Year 4','Year 5'];
  const COLS=8; // label + base + 5 years + terminal

  // ── ASSESSMENT ──
  const assessment=model.upside>15?{label:'Undervalued',color:'#059669',bg:'rgba(5,150,105,.08)'}:
    model.upside<-15?{label:'Overvalued',color:'#dc2626',bg:'rgba(220,38,38,.08)'}:
    {label:'Fairly Valued',color:'#d97706',bg:'rgba(217,119,6,.08)'};

  return(
    <div style={{margin:'28px 0'}}>
      {/* ── ORIENTATION PANEL ── */}
      <div style={{border:'1px solid var(--border)',marginBottom:'16px',background:'#fff'}}>
        <button onClick={()=>setShowOrientation(p=>!p)} style={{
          width:'100%',padding:'14px 20px',background:'none',border:'none',cursor:'pointer',
          display:'flex',alignItems:'center',justifyContent:'space-between',
          fontFamily:'var(--f-body)',fontSize:'12px',fontWeight:600,color:'var(--text1)',textAlign:'left'
        }}>
          <span style={{display:'flex',alignItems:'center',gap:'8px'}}>
            <span style={{fontSize:'14px'}}>📘</span> What Is a DCF Model? — Orientation Guide
          </span>
          <span style={{fontSize:'10px',color:'var(--text4)'}}>{showOrientation?'▼ Hide':'▶ Show'}</span>
        </button>
        {showOrientation&&(
          <div style={{padding:'0 20px 20px',fontSize:'13px',color:'var(--text2)',lineHeight:1.7,fontWeight:300}}>
            <p style={{marginBottom:'12px'}}>A <strong>Discounted Cash Flow (DCF)</strong> model estimates what a business is worth today by projecting its future cash flows and discounting them back to present value. It is the foundational valuation methodology used in investment banking, private equity, and hedge fund analysis.</p>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px',margin:'16px 0'}}>
              {[
                {n:'1',t:'Revenue & FCF Build',d:'Project revenue growth, then calculate free cash flow — the actual cash the business generates after all operating costs and reinvestment.'},
                {n:'2',t:'Terminal Value',d:'Estimate the value of all cash flows beyond the explicit forecast period. This typically represents 60–80% of total value — the single most important assumption.'},
                {n:'3',t:'Valuation Bridge',d:'Sum the present values, subtract net debt, and divide by shares outstanding to get an implied share price.'}
              ].map(s=>(
                <div key={s.n} style={{background:'var(--surface2)',padding:'14px',border:'1px solid var(--border)'}}>
                  <div style={{fontFamily:'var(--f-display)',fontSize:'22px',color:'rgba(201,170,113,.15)',marginBottom:'6px'}}>{s.n}</div>
                  <div style={{fontSize:'11px',fontWeight:600,color:'var(--text1)',marginBottom:'4px'}}>{s.t}</div>
                  <div style={{fontSize:'10px',color:'var(--text3)',lineHeight:1.6}}>{s.d}</div>
                </div>
              ))}
            </div>
            <div style={{background:'var(--ink)',padding:'14px 18px',borderLeft:'3px solid var(--gold)'}}>
              <div style={{fontFamily:'var(--f-mono)',fontSize:'9px',color:'var(--gold)',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:'6px'}}>The Single Most Important Thing</div>
              <div style={{fontSize:'12px',color:'rgba(255,255,255,.75)',lineHeight:1.7,fontWeight:300}}>Terminal value typically represents <strong style={{color:'var(--gold)'}}>60–80%</strong> of total DCF value. This means the terminal growth rate and WACC assumptions dominate the output. Change the model below and watch how sensitive the share price is to these two inputs.</div>
            </div>
          </div>
        )}
      </div>

      {/* ── MODEL HEADER ── */}
      <div style={{border:'1px solid var(--border)',background:'#fff',overflow:'hidden'}}>
        <div style={{padding:'14px 20px',background:'var(--ink)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'10px'}}>
          <div>
            <div style={{fontFamily:'var(--f-mono)',fontSize:'9px',color:'rgba(255,255,255,.35)',letterSpacing:'.14em',textTransform:'uppercase',marginBottom:'3px'}}>Interactive DCF Model</div>
            <div style={{fontFamily:'var(--f-display)',fontSize:'16px',color:'#fff'}}>Apex Software — Discounted Cash Flow Valuation</div>
          </div>
          <div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>
            <div style={{fontFamily:'var(--f-mono)',fontSize:'9px',padding:'3px 8px',borderRadius:'2px',background:BLUE_BG,color:BLUE,border:'1px solid '+BLUE_BORDER}}>BLUE = Your Inputs</div>
            <div style={{fontFamily:'var(--f-mono)',fontSize:'9px',padding:'3px 8px',borderRadius:'2px',background:'rgba(255,255,255,.05)',color:'rgba(255,255,255,.45)'}}>BLACK = Formulas</div>
            <button onClick={()=>setShowFormulas(p=>!p)} style={{fontFamily:'var(--f-mono)',fontSize:'9px',padding:'3px 8px',borderRadius:'2px',background:showFormulas?'rgba(201,170,113,.15)':'rgba(255,255,255,.05)',color:showFormulas?'var(--gold)':'rgba(255,255,255,.35)',border:'1px solid '+(showFormulas?'rgba(201,170,113,.3)':'rgba(255,255,255,.1)'),cursor:'pointer'}}>
              {showFormulas?'✓ Formulas':'Show Formulas'}
            </button>
            <button onClick={()=>setInp({...defaults})} style={{fontFamily:'var(--f-mono)',fontSize:'9px',padding:'3px 8px',borderRadius:'2px',background:'rgba(255,255,255,.05)',color:'rgba(255,255,255,.35)',border:'1px solid rgba(255,255,255,.1)',cursor:'pointer'}}>↻ Reset</button>
          </div>
        </div>

        {/* ── SPREADSHEET GRID ── */}
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:'11px',minWidth:'720px'}}>
            <thead>
              <tr style={{background:SEC_BG}}>
                <th style={{padding:'7px 8px',textAlign:'left',fontFamily:'var(--f-mono)',fontSize:'9px',color:'var(--text4)',letterSpacing:'.1em',fontWeight:500,minWidth:'200px',position:'sticky',left:0,background:SEC_BG,zIndex:2}}>LINE ITEM</th>
                {years.map(y=><th key={y} style={{padding:'7px 8px',textAlign:'right',fontFamily:'var(--f-mono)',fontSize:'9px',color:'var(--text4)',letterSpacing:'.08em',fontWeight:500,minWidth:'72px'}}>{y}</th>)}
                <th style={{padding:'7px 8px',textAlign:'right',fontFamily:'var(--f-mono)',fontSize:'9px',color:'var(--text4)',letterSpacing:'.08em',fontWeight:500}}>Terminal</th>
              </tr>
            </thead>
            <tbody>
              {/* ── REVENUE BUILD ── */}
              <SectionHeader text="Revenue Build" cols={COLS}/>

              <tr style={{borderBottom:'1px solid var(--border)'}}>
                <LabelCell text="Revenue Growth Rate (%)" tooltip="gRate"/>
                <td style={{padding:'5px 8px',textAlign:'right',fontSize:'10px',color:'var(--text5)',fontFamily:'var(--f-mono)'}}>—</td>
                {inp.g.map((v,i)=><EditCell key={i} value={v} field="g" idx={i} min={-50} max={100} suffix="%"/>)}
                <OutCell value={fP(inp.termGrowth)} dim/>
              </tr>

              <tr style={{borderBottom:'1px solid var(--border)',background:ROW_ALT}}>
                <LabelCell text="Revenue ($M)" tooltip="rev" formula="rev"/>
                <OutCell value={fM(model.revs[0])} bold/>
                {model.revs.slice(1).map((r,i)=><OutCell key={i} value={fM(r)} bold/>)}
                <OutCell value="—" dim/>
              </tr>

              {/* ── FCF BUILD ── */}
              <SectionHeader text="Free Cash Flow Build" cols={COLS}/>

              <tr style={{borderBottom:'1px solid var(--border)'}}>
                <LabelCell text="EBIT Margin (%)" tooltip="ebitM"/>
                <td style={{padding:'5px 8px',textAlign:'right',fontSize:'10px',color:'var(--text5)',fontFamily:'var(--f-mono)'}}>—</td>
                {inp.ebitMargin.map((v,i)=><EditCell key={i} value={v} field="ebitMargin" idx={i} min={-50} max={80} suffix="%"/>)}
                <td/>
              </tr>

              <tr style={{borderBottom:'1px solid var(--border)',background:ROW_ALT}}>
                <LabelCell text="EBIT ($M)" tooltip="ebit" formula="ebit" indent/>
                <td/>
                {model.ebit.map((v,i)=><OutCell key={i} value={fM(v)}/>)}
                <td/>
              </tr>

              <tr style={{borderBottom:'1px solid var(--border)'}}>
                <LabelCell text="Tax Rate (%)" indent/>
                <td/>
                <td colSpan={5} style={{textAlign:'center'}}>
                  <span onClick={()=>setActiveCell('taxRate')} style={{cursor:'pointer',color:BLUE,fontFamily:'var(--f-mono)',fontSize:'11px',fontWeight:600,background:BLUE_BG,padding:'2px 8px',borderRadius:'2px',border:'1px solid '+BLUE_BORDER}}>
                    {activeCell==='taxRate'?(
                      <input type="number" value={inp.taxRate} min={0} max={50} step={0.5} autoFocus
                        onChange={e=>upd('taxRate',e.target.value)} onBlur={()=>setActiveCell(null)}
                        onKeyDown={e=>{if(e.key==='Enter')setActiveCell(null);}}
                        style={{width:'40px',border:'none',background:'transparent',color:BLUE,fontFamily:'var(--f-mono)',fontSize:'11px',fontWeight:600,textAlign:'center',outline:'none'}}/>
                    ):`${inp.taxRate.toFixed(1)}%`}
                  </span>
                </td>
                <td/>
              </tr>

              <tr style={{borderBottom:'1px solid var(--border)',background:ROW_ALT}}>
                <LabelCell text="NOPAT ($M)" tooltip="nopat" formula="nopat" indent/>
                <td/>
                {model.nopat.map((v,i)=><OutCell key={i} value={fM(v)}/>)}
                <td/>
              </tr>

              <tr style={{borderBottom:'1px solid var(--border)'}}>
                <LabelCell text={`Less: CapEx (${inp.capexPct}% of Rev)`} tooltip="capex" formula="capex" indent/>
                <td/>
                {model.capex.map((v,i)=><OutCell key={i} value={`(${fM(v).replace('$','$')})`}/>)}
                <td/>
              </tr>

              <tr style={{borderBottom:'1px solid var(--border)',background:ROW_ALT}}>
                <LabelCell text={`Less: ΔNWC (${inp.nwcPct}% of Rev)`} tooltip="dwc" formula="dwc" indent/>
                <td/>
                {model.dwc.map((v,i)=><OutCell key={i} value={`(${fM(v).replace('$','$')})`}/>)}
                <td/>
              </tr>

              <tr style={{borderBottom:'2px solid var(--border)'}}>
                <LabelCell text="Free Cash Flow ($M)" tooltip="fcf" formula="fcf"/>
                <td/>
                {model.fcf.map((v,i)=><OutCell key={i} value={fM(v)} bold highlight={v>0}/>)}
                <td/>
              </tr>

              {/* ── ASSUMPTIONS ROW ── */}
              <tr style={{borderBottom:'1px solid var(--border)'}}>
                <td style={{padding:'5px 8px',fontSize:'10px',color:'var(--text4)'}}>CapEx % of Revenue</td>
                <td/>
                <td colSpan={3} style={{textAlign:'center'}}>
                  <span onClick={()=>setActiveCell('capexPct')} style={{cursor:'pointer',color:BLUE,fontFamily:'var(--f-mono)',fontSize:'11px',fontWeight:600,background:BLUE_BG,padding:'2px 8px',borderRadius:'2px',border:'1px solid '+BLUE_BORDER}}>
                    {activeCell==='capexPct'?<input type="number" value={inp.capexPct} min={0} max={50} step={0.5} autoFocus onChange={e=>upd('capexPct',e.target.value)} onBlur={()=>setActiveCell(null)} onKeyDown={e=>{if(e.key==='Enter')setActiveCell(null);}} style={{width:'40px',border:'none',background:'transparent',color:BLUE,fontFamily:'var(--f-mono)',fontSize:'11px',fontWeight:600,textAlign:'center',outline:'none'}}/>:`${inp.capexPct.toFixed(1)}%`}
                  </span>
                </td>
                <td style={{padding:'5px 8px',fontSize:'10px',color:'var(--text4)',textAlign:'right'}}>NWC % of Revenue</td>
                <td style={{textAlign:'center'}}>
                  <span onClick={()=>setActiveCell('nwcPct')} style={{cursor:'pointer',color:BLUE,fontFamily:'var(--f-mono)',fontSize:'11px',fontWeight:600,background:BLUE_BG,padding:'2px 8px',borderRadius:'2px',border:'1px solid '+BLUE_BORDER}}>
                    {activeCell==='nwcPct'?<input type="number" value={inp.nwcPct} min={0} max={30} step={0.5} autoFocus onChange={e=>upd('nwcPct',e.target.value)} onBlur={()=>setActiveCell(null)} onKeyDown={e=>{if(e.key==='Enter')setActiveCell(null);}} style={{width:'40px',border:'none',background:'transparent',color:BLUE,fontFamily:'var(--f-mono)',fontSize:'11px',fontWeight:600,textAlign:'center',outline:'none'}}/>:`${inp.nwcPct.toFixed(1)}%`}
                  </span>
                </td>
                <td/>
              </tr>

              {/* ── DISCOUNTING ── */}
              <SectionHeader text="Discounting & Present Value" cols={COLS}/>

              <tr style={{borderBottom:'1px solid var(--border)'}}>
                <LabelCell text="WACC" tooltip="df"/>
                <td colSpan={6} style={{textAlign:'center'}}>
                  <span onClick={()=>setActiveCell('wacc')} style={{cursor:'pointer',color:BLUE,fontFamily:'var(--f-mono)',fontSize:'12px',fontWeight:700,background:BLUE_BG,padding:'3px 12px',borderRadius:'2px',border:'1px solid '+BLUE_BORDER}}>
                    {activeCell==='wacc'?<input type="number" value={inp.wacc} min={1} max={30} step={0.25} autoFocus onChange={e=>upd('wacc',e.target.value)} onBlur={()=>setActiveCell(null)} onKeyDown={e=>{if(e.key==='Enter')setActiveCell(null);}} style={{width:'50px',border:'none',background:'transparent',color:BLUE,fontFamily:'var(--f-mono)',fontSize:'12px',fontWeight:700,textAlign:'center',outline:'none'}}/>:`${inp.wacc.toFixed(1)}%`}
                  </span>
                </td>
                <td/>
              </tr>

              <tr style={{borderBottom:'1px solid var(--border)',background:ROW_ALT}}>
                <LabelCell text="Discount Factor" tooltip="df" formula="df" indent/>
                <td/>
                {model.df.map((d,i)=><OutCell key={i} value={fX(d)}/>)}
                <td/>
              </tr>

              <tr style={{borderBottom:'2px solid var(--border)'}}>
                <LabelCell text="PV of Free Cash Flow ($M)" tooltip="pvFcf" formula="pvFcf"/>
                <td/>
                {model.pvFcf.map((p,i)=><OutCell key={i} value={fM(p)} bold/>)}
                <OutCell value={fM(model.sumPvFcf)} bold highlight/>
              </tr>

              {/* ── TERMINAL VALUE ── */}
              <SectionHeader text="Terminal Value (Gordon Growth Model)" cols={COLS}/>

              <tr style={{borderBottom:'1px solid var(--border)'}}>
                <LabelCell text="Terminal Growth Rate"/>
                <td colSpan={6} style={{textAlign:'center'}}>
                  <span onClick={()=>setActiveCell('termGrowth')} style={{cursor:'pointer',color:BLUE,fontFamily:'var(--f-mono)',fontSize:'12px',fontWeight:700,background:BLUE_BG,padding:'3px 12px',borderRadius:'2px',border:'1px solid '+BLUE_BORDER}}>
                    {activeCell==='termGrowth'?<input type="number" value={inp.termGrowth} min={0} max={inp.wacc-0.5} step={0.25} autoFocus onChange={e=>upd('termGrowth',e.target.value)} onBlur={()=>setActiveCell(null)} onKeyDown={e=>{if(e.key==='Enter')setActiveCell(null);}} style={{width:'50px',border:'none',background:'transparent',color:BLUE,fontFamily:'var(--f-mono)',fontSize:'12px',fontWeight:700,textAlign:'center',outline:'none'}}/>:`${inp.termGrowth.toFixed(1)}%`}
                  </span>
                </td>
                <td/>
              </tr>

              <tr style={{borderBottom:'1px solid var(--border)',background:ROW_ALT}}>
                <LabelCell text="Terminal Value ($M)" tooltip="tv" indent/>
                <td colSpan={5}/>
                <td/>
                <OutCell value={fM(model.tv)} bold/>
              </tr>

              <tr style={{borderBottom:'2px solid var(--border)'}}>
                <LabelCell text="PV of Terminal Value ($M)" tooltip="pvTv"/>
                <td colSpan={5} style={{padding:'5px 8px',fontFamily:'var(--f-mono)',fontSize:'9px',color:'var(--text5)',textAlign:'right'}}>
                  TV as % of EV: <span style={{color:model.tvPctEV>80?'#dc2626':model.tvPctEV>70?'#d97706':'var(--text3)',fontWeight:600}}>{model.tvPctEV.toFixed(1)}%</span>
                </td>
                <td/>
                <OutCell value={fM(model.pvTv)} bold highlight/>
              </tr>

              {/* ── VALUATION BRIDGE ── */}
              <SectionHeader text="Valuation Bridge" cols={COLS}/>

              <tr style={{borderBottom:'1px solid var(--border)',background:ROW_ALT}}>
                <LabelCell text="Enterprise Value" tooltip="ev"/>
                <td colSpan={6} style={{fontFamily:'var(--f-mono)',fontSize:'9px',color:'var(--text5)',textAlign:'right',padding:'5px 8px'}}>Σ PV FCFs ({fM(model.sumPvFcf)}) + PV TV ({fM(model.pvTv)})</td>
                <OutCell value={fB(model.ev)} bold highlight/>
              </tr>

              <tr style={{borderBottom:'1px solid var(--border)'}}>
                <LabelCell text="Less: Net Debt ($M)"/>
                <td colSpan={5}/>
                <EditCell value={inp.netDebt} field="netDebt" min={-10000} max={100000} step={10} prefix="$" suffix="M"/>
                <td/>
              </tr>

              <tr style={{borderBottom:'1px solid var(--border)',background:ROW_ALT}}>
                <LabelCell text="Equity Value" tooltip="eqVal"/>
                <td colSpan={6}/>
                <OutCell value={fB(model.eqVal)} bold highlight/>
              </tr>

              <tr style={{borderBottom:'1px solid var(--border)'}}>
                <LabelCell text="Shares Outstanding (M)"/>
                <td colSpan={5}/>
                <EditCell value={inp.shares} field="shares" min={1} max={10000} step={1} suffix="M"/>
                <td/>
              </tr>
            </tbody>
          </table>
        </div>

        {/* ── OUTPUT PANEL ── */}
        <div style={{padding:'20px 24px',background:'linear-gradient(135deg,#09090e 0%,#1a1a24 100%)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'16px'}}>
          <div>
            <div style={{fontFamily:'var(--f-mono)',fontSize:'9px',color:'rgba(255,255,255,.35)',letterSpacing:'.14em',textTransform:'uppercase',marginBottom:'6px'}}>Implied Intrinsic Value Per Share</div>
            <div style={{display:'flex',alignItems:'baseline',gap:'16px'}}>
              <div style={{fontFamily:'var(--f-display)',fontSize:'48px',color:'#c9aa71',lineHeight:1}}>{fS(model.ivps)}</div>
              <div style={{padding:'4px 10px',borderRadius:'2px',background:assessment.bg,fontFamily:'var(--f-mono)',fontSize:'10px',fontWeight:600,color:assessment.color}}>
                {model.upside>=0?'▲':'▼'} {Math.abs(model.upside).toFixed(1)}% vs. ${inp.curPrice.toFixed(2)} · {assessment.label}
              </div>
            </div>
          </div>
          <div style={{display:'flex',gap:'28px',flexWrap:'wrap'}}>
            {[
              {l:'Enterprise Value',v:fB(model.ev)},
              {l:'Equity Value',v:fB(model.eqVal)},
              {l:'TV % of EV',v:fP(model.tvPctEV)},
              {l:'Current Price',v:fS(inp.curPrice),edit:true},
            ].map(s=>(
              <div key={s.l} style={{textAlign:'right'}}>
                <div style={{fontFamily:'var(--f-mono)',fontSize:'9px',color:'rgba(255,255,255,.3)',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:'3px'}}>{s.l}</div>
                {s.edit?(
                  <span onClick={()=>setActiveCell('curPrice')} style={{cursor:'pointer',fontFamily:'var(--f-mono)',fontSize:'14px',color:BLUE,fontWeight:600,background:BLUE_BG,padding:'2px 6px',borderRadius:'2px',border:'1px solid '+BLUE_BORDER}}>
                    {activeCell==='curPrice'?<input type="number" value={inp.curPrice} min={0.01} max={10000} step={0.5} autoFocus onChange={e=>upd('curPrice',e.target.value)} onBlur={()=>setActiveCell(null)} onKeyDown={e=>{if(e.key==='Enter')setActiveCell(null);}} style={{width:'50px',border:'none',background:'transparent',color:BLUE,fontFamily:'var(--f-mono)',fontSize:'14px',fontWeight:600,textAlign:'right',outline:'none'}}/>:fS(inp.curPrice)}
                  </span>
                ):(
                  <div style={{fontFamily:'var(--f-mono)',fontSize:'14px',color:'rgba(255,255,255,.8)',fontWeight:600}}>{s.v}</div>
                )}
              </div>
            ))}
          </div>
        </div>

        {/* ── SENSITIVITY TABLE ── */}
        <div style={{borderTop:'1px solid var(--border)'}}>
          <button onClick={()=>setShowSens(p=>!p)} style={{width:'100%',padding:'10px 20px',background:'none',border:'none',cursor:'pointer',fontFamily:'var(--f-mono)',fontSize:'10px',color:'var(--text3)',letterSpacing:'.1em',textTransform:'uppercase',textAlign:'left',display:'flex',alignItems:'center',gap:'8px'}}>
            <span style={{fontSize:'11px'}}>{showSens?'▼':'▶'}</span>
            Sensitivity Analysis — Implied Share Price (WACC × Terminal Growth Rate)
          </button>
          {showSens&&(
            <div style={{overflowX:'auto',padding:'0 20px 16px'}}>
              <table style={{borderCollapse:'collapse',fontSize:'11px',margin:'0 auto'}}>
                <thead>
                  <tr>
                    <th style={{padding:'5px 10px',background:SEC_BG,fontFamily:'var(--f-mono)',fontSize:'8px',color:'var(--text4)',letterSpacing:'.08em',textAlign:'center',border:'1px solid var(--border)'}}>WACC ↓ \ g →</th>
                    {sensData.tgRange.map(tg=>(
                      <th key={tg} style={{padding:'5px 10px',background:tg===inp.termGrowth?BLUE_BG:SEC_BG,fontFamily:'var(--f-mono)',fontSize:'9px',color:tg===inp.termGrowth?BLUE:'var(--text4)',letterSpacing:'.06em',textAlign:'center',border:'1px solid var(--border)',fontWeight:tg===inp.termGrowth?700:400}}>{tg.toFixed(1)}%</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {sensData.grid.map((row,wi)=>{
                    const wv=sensData.wRange[wi];
                    const isBaseW=wv===inp.wacc;
                    return(
                      <tr key={wi}>
                        <td style={{padding:'5px 10px',background:isBaseW?BLUE_BG:SEC_BG,fontFamily:'var(--f-mono)',fontSize:'9px',color:isBaseW?BLUE:'var(--text4)',border:'1px solid var(--border)',textAlign:'center',fontWeight:isBaseW?700:400}}>{wv.toFixed(1)}%</td>
                        {row.map((val,ti)=>{
                          const tgv=sensData.tgRange[ti];
                          const isBase=isBaseW&&tgv===inp.termGrowth;

                          const pctDiff=(val-inp.curPrice)/inp.curPrice;
                          const bg=isBase?'rgba(201,170,113,.15)':pctDiff>0.10?'rgba(5,150,105,.06)':pctDiff<-0.10?'rgba(220,38,38,.06)':pctDiff>-0.10&&pctDiff<0.10?'rgba(217,119,6,.04)':'transparent';
                          const color=isBase?'#a88b52':pctDiff>0.10?'#059669':pctDiff<-0.10?'#dc2626':'#d97706';
                          return(<td key={ti} style={{padding:'5px 10px',fontFamily:'var(--f-mono)',fontSize:'11px',color,background:bg,border:'1px solid var(--border)',textAlign:'center',fontWeight:isBase?700:400}}>{fS(val)}</td>);
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
              <div style={{display:'flex',gap:'16px',justifyContent:'center',padding:'8px 0',fontFamily:'var(--f-mono)',fontSize:'9px',color:'var(--text4)'}}>

                <span><span style={{display:'inline-block',width:'8px',height:'8px',background:'rgba(217,119,6,.1)',border:'1px solid #d97706',marginRight:'4px'}}/>±10%</span>
                <span><span style={{display:'inline-block',width:'8px',height:'8px',background:'rgba(220,38,38,.1)',border:'1px solid #dc2626',marginRight:'4px'}}/>Downside {'>'}10%</span>
                <span><span style={{display:'inline-block',width:'8px',height:'8px',background:'rgba(201,170,113,.2)',border:'1px solid #a88b52',marginRight:'4px'}}/>Base Case</span>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── DYNAMIC INSIGHTS ── */}
      <div style={{marginTop:'16px',border:'1px solid var(--border)',background:'#fff',padding:'20px 24px'}}>
        <div style={{fontFamily:'var(--f-mono)',fontSize:'9px',color:'var(--text4)',letterSpacing:'.12em',textTransform:'uppercase',marginBottom:'14px'}}>Key Insights — Dynamic Analysis</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px'}}>
          <div style={{padding:'14px',background:model.tvPctEV>80?'rgba(220,38,38,.05)':model.tvPctEV>70?'rgba(217,119,6,.05)':'rgba(5,150,105,.05)',border:'1px solid var(--border)'}}>
            <div style={{fontSize:'10px',fontWeight:600,color:'var(--text1)',marginBottom:'4px'}}>Terminal Value Concentration</div>
            <div style={{fontFamily:'var(--f-display)',fontSize:'22px',color:model.tvPctEV>80?'#dc2626':model.tvPctEV>70?'#d97706':'#059669',marginBottom:'4px'}}>{model.tvPctEV.toFixed(1)}%</div>
            <div style={{fontSize:'10px',color:'var(--text3)',lineHeight:1.5}}>
              {model.tvPctEV>80?'⚠️ Terminal value exceeds 80% of EV — model is heavily dependent on terminal assumptions. Scrutinize WACC and terminal growth carefully.':
               model.tvPctEV>70?'Terminal value in the 70–80% range — typical for growth companies. Sensitivity to terminal assumptions is meaningful.':
               'Terminal value below 70% — explicit forecast period cash flows carry significant weight. Model is relatively robust.'}
            </div>
          </div>
          <div style={{padding:'14px',background:'var(--surface2)',border:'1px solid var(--border)'}}>
            <div style={{fontSize:'10px',fontWeight:600,color:'var(--text1)',marginBottom:'4px'}}>Implied Revenue CAGR</div>
            <div style={{fontFamily:'var(--f-display)',fontSize:'22px',color:model.impliedRevCAGR>20?'#d97706':'var(--text1)',marginBottom:'4px'}}>{model.impliedRevCAGR.toFixed(1)}%</div>
            <div style={{fontSize:'10px',color:'var(--text3)',lineHeight:1.5}}>
              {model.impliedRevCAGR>25?'Growth rate exceeds most industries. Verify against TAM and competitive dynamics.':
               model.impliedRevCAGR>15?'Strong growth implied. Typical for mid-stage software but aggressive for mature businesses.':
               'Moderate growth. Reasonable for established businesses with pricing power.'}
            </div>
          </div>
          <div style={{padding:'14px',background:'var(--surface2)',border:'1px solid var(--border)'}}>
            <div style={{fontSize:'10px',fontWeight:600,color:'var(--text1)',marginBottom:'4px'}}>WACC Assessment</div>
            <div style={{fontFamily:'var(--f-display)',fontSize:'22px',color:'var(--text1)',marginBottom:'4px'}}>{inp.wacc.toFixed(1)}%</div>
            <div style={{fontSize:'10px',color:'var(--text3)',lineHeight:1.5}}>
              {inp.wacc<8?'Below-average WACC — appropriate for low-risk businesses with stable cash flows (utilities, consumer staples).':
               inp.wacc<11?'Mid-range WACC — typical for established technology and industrial companies with moderate growth.':
               'Elevated WACC — appropriate for high-growth or high-risk businesses. Increases the discount on future cash flows.'}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function QuizBlock({quiz,lessonId}){
  const key='apex_quiz_'+lessonId;
  const [answers,setAnswers]=useState(()=>{try{return JSON.parse(localStorage.getItem(key))||{};}catch{return{};}});
  const handleAnswer=(qi,oi)=>{if(answers[qi]!==undefined)return;const next={...answers,[qi]:oi};setAnswers(next);try{localStorage.setItem(key,JSON.stringify(next));}catch{}};
  const correct=quiz.filter((q,i)=>answers[i]===q.ans).length;
  const answered=Object.keys(answers).length;
  return(
    <div className="quiz-wrap">
      <div className="quiz-head">
        <span className="quiz-head-title">Knowledge Check \u2014 {quiz.length} Questions</span>
        {answered>0&&<span className="quiz-head-score">{correct}/{answered} correct{answered===quiz.length?` \u00b7 ${Math.round(correct/quiz.length*100)}%`:''}</span>}
      </div>
      {quiz.map((q,qi)=>{const chosen=answers[qi];return(
        <div key={qi} className="quiz-q">
          <div className="quiz-qn">Q{qi+1} of {quiz.length}</div>
          <div className="quiz-qtext">{q.q}</div>
          <div className="quiz-opts">
            {q.opts.map((opt,oi)=>{let cls='quiz-opt';if(chosen!==undefined){if(oi===q.ans)cls+=' cr';if(chosen===oi&&oi!==q.ans)cls+=' sw';if(chosen===oi&&oi===q.ans)cls+=' sc';}
              return(<button key={oi} className={cls} onClick={()=>handleAnswer(qi,oi)} disabled={chosen!==undefined}><span className="quiz-letter">{String.fromCharCode(65+oi)}</span>{opt}</button>);})}
          </div>
          {chosen!==undefined&&<div className={`quiz-fb ${chosen===q.ans?'ok':'no'}`}>{chosen===q.ans?'\u2713 Correct \u2014 ':'\u2717 Incorrect \u2014 '}{q.exp}</div>}
        </div>
      );})}
    </div>
  );
}

function LessonView({lesson,modTitle,completed,onComplete,onNext,onPrev}){
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    let cancelled=false;
    setLoading(true);
    setData(null);
    window.scrollTo({top:58,behavior:'smooth'});
    fetchLesson(lesson.id).then(d=>{if(!cancelled){setData(d);setLoading(false);}});
    return()=>{cancelled=true;};
  },[lesson.id]);
  if(loading)return(
    <div style={{padding:'80px 48px',textAlign:'center'}}>
      <div style={{fontFamily:'var(--f-mono)',fontSize:'10px',color:'var(--text5)',letterSpacing:'.14em',textTransform:'uppercase',marginBottom:'12px'}}>Loading lesson content</div>
      <div style={{width:'40px',height:'2px',background:'var(--gold)',margin:'0 auto',animation:'fadeIn .8s ease infinite alternate'}}/>
    </div>
  );
  if(!data)return<div style={{padding:'48px',color:'var(--text4)'}}>Content not available yet — check back soon.</div>;
  return(
    <div className="lesson-view ai">
      <div className="l-breadcrumb">{modTitle}<span>\u203a</span>{lesson.title}</div>
      <h1 className="l-title">{lesson.title}</h1>
      <div className="l-meta">
        <span className="l-tag gold">Finance</span>
        <span className="l-tag">{modTitle}</span>
        <span className="l-readtime">~{lesson.time}</span>
        {completed&&<span className="l-tag green">\u2713 Complete</span>}
      </div>
      <div className="l-hook">
        <div className="l-hook-label">Consider This</div>
        <div className="l-hook-text">{data.hook}</div>
      </div>
      {data.terms&&data.terms.length>0&&(<><h2 className="l-sec-h">Key Terms</h2><div className="l-terms">{data.terms.map(t=><div key={t.w} className="l-term"><div className="l-term-word">{t.w}</div><div className="l-term-def">{t.d}</div></div>)}</div></>)}
      {data.sections&&data.sections.map((s,si)=>(
        <div key={si}>
          <h2 className="l-sec-h">{s.h}</h2>
          {s.body&&<p className="l-body" dangerouslySetInnerHTML={{__html:s.body.replace(/\n\n/g,'</p><p class="l-body">')}}/>}
          {s.formula&&<div className="l-formula">{s.formula}</div>}
          {s.callout&&<div className="l-callout"><div className="l-callout-bar"/><div className="l-callout-content"><div className="l-callout-label">{s.callout.label}</div><div className="l-callout-text" dangerouslySetInnerHTML={{__html:s.callout.text}}/></div></div>}
          {s.body2&&<p className="l-body" dangerouslySetInnerHTML={{__html:s.body2}}/>}
          {s.list&&<ul className="l-list">{s.list.map((item,li)=><li key={li}>{item}</li>)}</ul>}
          {s.steps&&<ol className="l-steps">{s.steps.map((step,sti)=><li key={sti}>{step}</li>)}</ol>}
        </div>
      ))}
      {data.table&&(<><h2 className="l-sec-h">Reference Data</h2><div style={{overflowX:'auto'}}><table className="l-table"><thead><tr>{data.table.headers.map(h=><th key={h}>{h}</th>)}</tr></thead><tbody>{data.table.rows.map((row,ri)=><tr key={ri}>{row.map((cell,ci)=><td key={ci}>{cell}</td>)}</tr>)}</tbody></table></div></>)}
      {data.example&&(<><h2 className="l-sec-h">Worked Example</h2><div className="l-example"><div className="l-example-label">{data.example.label}</div><div className="l-example-body" dangerouslySetInnerHTML={{__html:data.example.text.replace(/\n\n/g,'<br/><br/>').replace(/\n/g,'<br/>')}}/></div></>)}
      {data.interactive==='dcf'&&(<><h2 className="l-sec-h">Interactive DCF Model</h2><p className="l-body" style={{marginBottom:'4px'}}>Build the model yourself. Blue cells are your inputs \u2014 click any one to edit. All outputs recalculate instantly. Start with the defaults, then change WACC and terminal growth to feel the sensitivity.</p><DCFModel companyName={data.modelCompany||'DCF Valuation'}/></>)}
      {data.quiz&&data.quiz.length>0&&<QuizBlock quiz={data.quiz} lessonId={lesson.id}/>}
      <div className="l-foot">
        <div style={{display:'flex',gap:'8px'}}>
          {onPrev&&<button onClick={onPrev} style={{background:'none',border:'1px solid var(--border)',color:'var(--text3)',cursor:'pointer',fontFamily:'var(--f-body)',fontSize:'11px',fontWeight:500,padding:'10px 20px',borderRadius:'2px',letterSpacing:'.05em',textTransform:'uppercase'}}>\u2190 Previous</button>}
          <button className={`btn-complete ${completed?'done':''}`} onClick={!completed?onComplete:undefined}>{completed?'\u2713 Completed':'Mark as Complete'}</button>
        </div>
        {onNext&&<button className="btn-next-l" onClick={onNext}>Next Lesson \u2192</button>}
      </div>
    </div>
  );
}

function CRing({pct,size=48,sw=3,color='#c9aa71',track='#e2e0da'}){
  const r=size/2-sw,c=2*Math.PI*r;
  return(<svg width={size} height={size} className="cring-svg"><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={track} strokeWidth={sw}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={sw} strokeDasharray={c} strokeDashoffset={c*(1-pct/100)} strokeLinecap="round" style={{transition:'stroke-dashoffset .6s var(--ease)'}}/></svg>);
}

const DS={'Introductory':{bg:'rgba(5,150,105,.08)',color:'#059669'},'Intermediate':{bg:'rgba(37,99,235,.08)',color:'#2563eb'},'Advanced':{bg:'rgba(220,38,38,.08)',color:'#dc2626'}};
const LS={'Foundations':{bg:'rgba(201,170,113,.1)',color:'#a88b52'},'Core':{bg:'rgba(9,9,14,.06)',color:'#3a3a4a'},'Advanced':{bg:'rgba(220,38,38,.06)',color:'#dc2626'},'Applied':{bg:'rgba(124,58,237,.07)',color:'#7c3aed'}};

function CourseCard({course,idx,unlocked,complete,accent,onStart}){
  const ds=DS[course.diff]||DS['Introductory'],ls=LS[course.level]||LS['Foundations'];
  const hasLessons=course.hasContent&&COURSE_LESSONS[course.id];
  return(
    <div className={`ccard ${unlocked&&hasLessons?'clickable':''} ${!unlocked?'locked':''}`} onClick={unlocked&&hasLessons?()=>onStart(course):undefined}>
      {!unlocked&&course.prereqLabel&&<div className="clock-tip">Complete "{course.prereqLabel}" to unlock</div>}
      <div className="ccard-inner">
        <div className="ccard-nc"><div className={`ccard-n ${complete?'done':unlocked?'ok':'no'}`}>{complete?'\u2713':idx+1}</div></div>
        <div className="ccard-body">
          <div className="ccard-row">
            <div><div className="ccard-pretitle" style={{color:unlocked?accent:'var(--text5)'}}>{course.pretitle}</div><div className={`ccard-title${!unlocked?' dim':''}`}>{course.title}{!hasLessons&&unlocked&&<span className="cs-chip" style={{marginLeft:8}}>Coming Soon</span>}</div></div>
            <div className="ccard-badges"><span className="cbadge" style={{background:ls.bg,color:ls.color}}>{course.level}</span><span className="cbadge" style={{background:ds.bg,color:ds.color}}>{course.diff}</span>{complete&&<span className="cbadge" style={{background:'var(--green-bg)',color:'var(--green)'}}>\u2713 Done</span>}</div>
          </div>
          <div className={`ccard-desc${!unlocked?' dim':''}`}>{course.desc}</div>
          <div className="ccard-meta"><div className="ccard-mi">\u23F1 {course.hours}</div><div className="ccard-sep"/><div className="ccard-mi">\u25EB {course.modules} modules</div><div className="ccard-sep"/><div className="ccard-mi">\u25A4 {course.lessons} lessons</div>{!unlocked&&course.prereqLabel&&<><div className="ccard-sep"/><div className="ccard-mi" style={{color:'var(--text5)'}}>\ud83d\udd12 {course.prereqLabel}</div></>}</div>
          {unlocked&&hasLessons&&<div className="ccard-skills">{course.skills.map(s=><span key={s} className="cskill">{s}</span>)}</div>}
        </div>
        <div className="ccard-ac">
          {unlocked?(hasLessons?(<><div className="cring-wrap"><CRing pct={complete?100:0} color={complete?'#1d6348':accent}/><div className="cring-pct" style={{color:complete?'var(--green)':accent}}>{complete?'\u2713':'0%'}</div></div><button className="cbtn-start" style={{background:accent}} onClick={e=>{e.stopPropagation();onStart(course)}}>{complete?'Review':'Start'}</button></>):(<><div style={{fontSize:'13px',opacity:.4}}>\ud83d\udd1c</div><button className="cbtn-locked" disabled>Coming Soon</button></>)):(<><div style={{fontSize:'14px'}}>🔒</div><button className="cbtn-locked" disabled>Locked</button>{course.prereqLabel&&<div style={{fontSize:'9px',color:'var(--text5)',textAlign:'center',lineHeight:1.4}}>Finish<br/><span style={{color:'var(--text3)'}}>{course.prereqLabel}</span></div>}</>)}
        </div>
      </div>
    </div>
  );
}

function CourseModal({course,track,onClose,onStart}){
  if(!course)return null;
  return(
    <div className="cmodal-overlay" onClick={onClose}>
      <div className="cmodal" onClick={e=>e.stopPropagation()}>
        <div className="cmodal-head"><div><div className="cmodal-pre" style={{color:track.accent}}>{course.pretitle} \u00b7 {track.label}</div><div className="cmodal-title">{course.title}</div></div><button className="cmodal-x" onClick={onClose}>\u00d7</button></div>
        <div className="cmodal-body">
          <div className="cmodal-stats">{[{l:'Duration',v:course.hours},{l:'Modules',v:course.modules},{l:'Lessons',v:course.lessons},{l:'Level',v:course.diff}].map(s=><div key={s.l} className="cmodal-stat"><div className="cms-l">{s.l}</div><div className="cms-v">{s.v}</div></div>)}</div>
          <div className="cmodal-desc">{course.desc}</div>
          <div className="cmodal-sec">Curriculum</div>
          <div>{course.moduleList.map(m=><div key={m.n} className="cmod-row"><div className="cmod-n">{m.n}</div><div className="cmod-name">{m.t}</div><div className="cmod-lessons">{m.l} lesson{m.l!==1?'s':''}</div></div>)}</div>
          <div className="cmodal-sec">Skills Covered</div>
          <div className="cmodal-skills">{course.skills.map(s=><span key={s} className="cmodal-skill">{s}</span>)}</div>
          <div className="cmodal-sec">What You'll Be Able to Do</div>
          <div className="cmodal-outcomes">{course.outcomes.map((o,i)=><div key={i} className="cmodal-outcome"><span style={{color:track.accent,fontWeight:600,flexShrink:0}}>\u2192</span>{o}</div>)}</div>
          <div className="cmodal-cta">
            {course.hasContent?<button className="cmbtn" style={{background:track.accent}} onClick={()=>{onStart(course);onClose();}}>Start Course</button>:<button className="cmbtn" style={{background:'var(--text4)',cursor:'not-allowed'}} disabled>Coming Soon</button>}
            <button className="cmbtn-ghost" onClick={onClose}>Close</button>

  );

function CatalogView({completed,onStartCourse}){
  const [tid,setTid]=useState('ib');
  const [modal,setModal]=useState(null);
  const track=TRACKS.find(t=>t.id===tid);
  const trackDone=track?track.courses.filter(c=>{const ls=COURSE_LESSONS[c.id];return ls&&ls.length>0&&ls.every(lid=>completed.has(lid));}).length:0;
  const trackTotal=track?track.courses.length:0;
  const trackHours=track?track.courses.reduce((a,c)=>a+parseInt(c.hours),0):0;
  function isUnlocked(course){if(!course.prereq)return true;const pls=COURSE_LESSONS[course.prereq];if(!pls||pls.length===0)return completed.has(course.prereq+'_done');return pls.every(lid=>completed.has(lid));}
  function isCourseComplete(course){const ls=COURSE_LESSONS[course.id];if(!ls)return false;return ls.every(lid=>completed.has(lid));}
  return(
    <div className="ai" style={{background:'var(--surface)'}}>
      <div className="cat-hero"><div className="cat-hero-grid"/>
        <div className="ch-tag au au1">APEX Capital Society \u00b7 Career Track Curriculum</div>
        <h1 className="ch-h1 au au2">Choose your<br/><em>career track.</em><br/>Build real skills.</h1>
        <p className="ch-sub au au3">Five structured career tracks. Each course uses real content from our lesson library \u2014 sequenced from foundations through execution-ready.</p>
        <div className="ch-stats au au4">{[{n:'5',l:'Career Tracks'},{n:'25',l:'Total Courses'},{n:'37',l:'Live Lessons'},{n:'30+',l:'Key Terms'}].map(s=><div key={s.l}><div className="chs-n">{s.n}</div><div className="chs-l">{s.l}</div></div>)}</div>
      </div>
      <div className="track-sel">
        <div className="track-sel-label">Select a career track</div>
        <div className="track-tabs">{TRACKS.map(t=>{const active=tid===t.id;return(<button key={t.id} className={`ttrack-tab${active?' active':''}`} style={active?{borderBottomColor:t.accent}:{}} onClick={()=>setTid(t.id)}><div className="ttt-top"><span className="ttt-icon" style={active?{color:t.accent}:{}}>{t.icon}</span><span className="ttt-name">{t.short} \u2014 {t.label}</span></div><div className="ttt-count">{t.courses.length} courses</div></button>);})}</div>
      </div>
      {track&&(
        <div className="cat-body ai" key={tid}>
          <div className="track-hd">
            <div><div className="thd-badge" style={{background:track.accentBg,color:track.accent}}>{track.icon} {track.label} Track</div><h2 className="thd-h2">{track.label}</h2><p className="thd-sub">{track.desc}</p></div>
            <div className="thd-right"><div className="thd-right-label">Prerequisites</div>{track.prereqs.map((p,i)=><div key={i} className="thd-right-row"><span style={{color:track.accent,fontSize:'10px'}}>\u2192</span>{p}</div>)}</div>
          </div>
          <div className="tprog"><span className="tprog-label">Track Progress</span><div className="tprog-bar"><div className="tprog-fill" style={{width:`${trackTotal>0?(trackDone/trackTotal)*100:0}%`,background:track.accent}}/></div><div style={{display:'flex',gap:'18px',flexShrink:0}}><div><div className="tprog-stat-n" style={{color:track.accent}}>{trackDone}/{trackTotal}</div><div className="tprog-stat-l">Courses</div></div><div><div className="tprog-stat-n">{trackHours}+</div><div className="tprog-stat-l">Hours</div></div></div></div>
          <div className="clist">{track.courses.map((course,idx)=><CourseCard key={course.id} course={course} idx={idx} unlocked={isUnlocked(course)} complete={isCourseComplete(course)} accent={track.accent} onStart={()=>onStartCourse(course,track)}/>)}</div>
          <div className="outcomes-section"><div className="outcomes-label">What You'll Achieve</div><div className="outcomes-g">{track.outcomes.map((o,i)=><div key={i} className="outcome-r"><span style={{color:track.accent,fontWeight:600,flexShrink:0}}>\u2192</span>{o}</div>)}</div></div>
        </div>
      )}
      {modal&&<CourseModal course={modal} track={track} onClose={()=>setModal(null)} onStart={(c)=>{onStartCourse(c,track);setModal(null);}}/>}
    </div>
  );
}

function CourseLessonView({course,track,completed,onComplete,onFinishCourse}){
  const lessonIds=COURSE_LESSONS[course.id]||[];
  const allLessons=MODULES.flatMap(m=>m.lessons.map(l=>({...l,modId:m.id,modTitle:m.title})));
  const courseLessons=lessonIds.map(lid=>allLessons.find(l=>l.id===lid)).filter(Boolean);
  const [activeId,setActiveId]=useState(courseLessons[0]?.id||null);
  const [sideTab,setSideTab]=useState('modules');
  const [glossSearch,setGlossSearch]=useState('');
  const active=courseLessons.find(l=>l.id===activeId)||courseLessons[0];
  const activeIdx=courseLessons.findIndex(l=>l.id===activeId);
  const prevLesson=courseLessons[activeIdx-1]||null;
  const nextLesson=courseLessons[activeIdx+1]||null;
  const doneLessons=courseLessons.filter(l=>completed.has(l.id)).length;
  const totalPct=courseLessons.length>0?Math.round(doneLessons/courseLessons.length*100):0;
  const allDone=doneLessons===courseLessons.length&&courseLessons.length>0;
  const filteredGloss=useMemo(()=>{if(!glossSearch.trim())return GLOSSARY;const q=glossSearch.toLowerCase();return GLOSSARY.filter(g=>g.w.toLowerCase().includes(q)||g.d.toLowerCase().includes(q));},[glossSearch]);
  const glossByLetter=useMemo(()=>{const m={};filteredGloss.forEach(g=>{const l=g.w[0].toUpperCase();if(!m[l])m[l]=[];m[l].push(g);});return m;},[filteredGloss]);
  if(!active)return<div style={{padding:'48px',color:'var(--text4)'}}>No lessons found.</div>;
  return(
    <div style={{display:'flex'}}>
      <aside className="sidebar">
        <div className="sidebar-head">
          <div className="sidebar-head-label">{course.title}</div>
          <div><div className="sidebar-bar-track"><div className="sidebar-bar-fill" style={{width:`${totalPct}%`,background:track.accent}}/></div><div className="sidebar-bar-stats"><span>{doneLessons}/{courseLessons.length} lessons</span><span style={{color:track.accent}}>{totalPct}%</span></div></div>
        </div>
        <div className="sidebar-tabs">{[['modules','Modules'],['glossary','Glossary']].map(([id,label])=><button key={id} className={`sidebar-tab ${sideTab===id?'active':''}`} style={sideTab===id?{color:track.accent,borderBottomColor:track.accent}:{}} onClick={()=>setSideTab(id)}>{label}</button>)}</div>
        <div className="sidebar-scroll">
          {sideTab==='modules'&&(<div>
            {courseLessons.map((lesson,li)=>{const isDone=completed.has(lesson.id);const isActive=activeId===lesson.id;return(
              <button key={lesson.id} className={`lesson-item${isActive?' active':''}${isDone?' done-item':''}`} onClick={()=>setActiveId(lesson.id)}>
                <span className={`lesson-dot${isDone?' done':isActive?' cur':''}`} style={isDone?{background:track.accent,borderColor:track.accent}:isActive?{borderColor:track.accent}:{}}/>
                <div><div className="lesson-item-name">{li+1}. {lesson.title}</div><div className="lesson-item-time">{lesson.time}</div></div>
              </button>
            );})}
            {allDone&&<div style={{padding:'16px',margin:'8px',background:'var(--green-bg)',border:'1px solid rgba(29,99,72,.2)',borderRadius:'2px'}}><div style={{fontSize:'10px',color:'var(--green)',fontWeight:600,marginBottom:'6px'}}>\ud83c\udf93 Course Complete!</div><button onClick={onFinishCourse} style={{width:'100%',background:'var(--green)',color:'#fff',border:'none',cursor:'pointer',fontFamily:'var(--f-body)',fontSize:'10px',fontWeight:600,padding:'8px',borderRadius:'2px',letterSpacing:'.06em',textTransform:'uppercase'}}>Back to Catalog</button></div>}
          </div>)}
          {sideTab==='glossary'&&(<>
            <div className="gloss-search"><input placeholder="Search terms..." value={glossSearch} onChange={e=>setGlossSearch(e.target.value)}/></div>
            {Object.keys(glossByLetter).sort().map(letter=><div key={letter}><div className="gloss-letter">{letter}</div>{glossByLetter[letter].map(g=><div key={g.w} className="gloss-term"><div className="gloss-term-word">{g.w}</div><div className="gloss-term-def">{g.d}</div></div>)}</div>)}
          </>)}
        </div>
      </aside>
      <main className="content-area"><LessonView key={activeId} lesson={active} modTitle={active.modTitle} completed={completed.has(activeId)} onComplete={()=>onComplete(activeId)} onNext={nextLesson?()=>setActiveId(nextLesson.id):null} onPrev={prevLesson?()=>setActiveId(prevLesson.id):null}/></main>
    </div>
  );
}

function UnifiedDashboard({completed}){
  const totalLessons=TOTAL;
  const doneLessons=[...completed].filter(k=>MODULES.some(m=>m.lessons.some(l=>l.id===k))).length;
  const totalPct=totalLessons>0?Math.round(doneLessons/totalLessons*100):0;
  const trackProgress=TRACKS.map(t=>{
    const coursesWithLessons=t.courses.filter(c=>COURSE_LESSONS[c.id]);
    const totalL=coursesWithLessons.reduce((a,c)=>(COURSE_LESSONS[c.id]||[]).length+a,0);
    const doneL=coursesWithLessons.reduce((a,c)=>(COURSE_LESSONS[c.id]||[]).filter(lid=>completed.has(lid)).length+a,0);
    return{...t,doneL,totalL,pct:totalL>0?Math.round(doneL/totalL*100):0};
  });
  const recentDone=MODULES.flatMap(m=>m.lessons.map(l=>({...l,modTitle:m.title}))).filter(l=>completed.has(l.id)).slice(-6).reverse();
  return(
    <div className="ai" style={{background:'var(--surface)'}}>
      <div className="dash-head"><div className="dash-eyebrow">Learning Dashboard</div><div className="dash-h1">Your Progress</div><div className="dash-tabs"><button className="dash-tab active">Overview</button></div></div>
      <div className="dash-body">
        <div className="kpi-grid">{[{l:'Lessons Done',v:`${doneLessons}`,s:`of ${totalLessons}`},{l:'Progress',v:`${totalPct}%`,s:'completion'},{l:'Active Tracks',v:`${trackProgress.filter(t=>t.doneL>0).length}`,s:'of 5 started'}].map(c=><div key={c.l} className="kpi"><div className="kpi-label">{c.l}</div><div className="kpi-val">{c.v}</div><div className="kpi-sub">{c.s}</div></div>)}</div>
        <div className="mod-progress-table"><div className="mpt-head">Progress by Track</div>{trackProgress.map(t=><div key={t.id} className="mpt-row"><span className="mpt-name" style={{display:'flex',alignItems:'center',gap:'7px'}}><span style={{color:t.accent}}>{t.icon}</span>{t.label}</span><span className="mpt-count">{t.doneL}/{t.totalL}</span><div className="mpt-bar"><div className="mpt-fill" style={{width:`${t.pct}%`,background:t.accent}}/></div><span className="mpt-pct">{t.pct}%</span></div>)}</div>
        {recentDone.length>0?(<div className="activity-table"><div className="at-head">Recently Completed</div>{recentDone.map(l=><div key={l.id} className="at-row"><div className="at-dot"/><span className="at-name">{l.title}</span><span className="at-mod">{l.modTitle}</span><span className="at-badge done">Complete</span></div>)}</div>):(<div className="empty-state"><div className="empty-label">No Activity Yet</div><div className="empty-text">Start a course from the Catalog.</div></div>)}
      </div>
    </div>
  );
}

function App(){
  const [view,setView]=useState('catalog');
  const [activeCourse,setActiveCourse]=useState(null);
  const [activeTrack,setActiveTrack]=useState(null);
  const [completed,setCompleted]=useState(()=>{try{return new Set(JSON.parse(localStorage.getItem('apex_v1_done'))||[]);}catch{return new Set();}});
  const handleComplete=useCallback((lessonId)=>{setCompleted(prev=>{const next=new Set(prev);next.add(lessonId);try{localStorage.setItem('apex_v1_done',JSON.stringify([...next]));}catch{}return next;});},[]);
  const handleStartCourse=(course,track)=>{setActiveCourse(course);setActiveTrack(track);setView('lesson');window.scrollTo({top:0,behavior:'smooth'});};
  const handleBack=()=>{setView('catalog');window.scrollTo({top:0,behavior:'smooth'});};
  const totalDone=[...completed].filter(k=>MODULES.some(m=>m.lessons.some(l=>l.id===k))).length;
  return(
    <>
      <nav className="nav">
        <div className="nav-brand" onClick={handleBack}><div className="nav-mark">A</div><span className="nav-name">APEX Capital Society</span></div>
        <div style={{display:'flex',alignItems:'center',gap:'8px',flex:1,justifyContent:'center'}}>
          {view==='lesson'&&activeCourse&&activeTrack&&(
            <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
              <button onClick={handleBack} style={{background:'none',border:'none',cursor:'pointer',fontFamily:'var(--f-mono)',fontSize:'9px',color:'rgba(255,255,255,.4)',letterSpacing:'.1em',textTransform:'uppercase'}}>\u2190 Catalog</button>
              <span style={{color:'rgba(255,255,255,.2)',fontSize:'10px'}}>/</span>
              <span style={{fontFamily:'var(--f-mono)',fontSize:'9px',color:activeTrack.accent,letterSpacing:'.1em',textTransform:'uppercase'}}>{activeTrack.short}</span>
              <span style={{color:'rgba(255,255,255,.2)',fontSize:'10px'}}>/</span>
              <span style={{fontFamily:'var(--f-mono)',fontSize:'9px',color:'rgba(255,255,255,.5)',letterSpacing:'.08em',textTransform:'uppercase'}}>{activeCourse.title}</span>
            </div>
          )}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'2px'}}>
          {[['catalog','Catalog'],['dashboard','Dashboard']].map(([v,l])=><button key={v} className="nav-link" style={{color:view===v?'var(--gold)':'rgba(255,255,255,.4)'}} onClick={()=>{setView(v);window.scrollTo({top:0,behavior:'smooth'});}}>{l}</button>)}
          <div style={{marginLeft:'12px',display:'flex',alignItems:'center',gap:'6px'}}>
            <div style={{width:'60px',height:'2px',background:'rgba(255,255,255,.1)',borderRadius:'1px'}}><div style={{height:'100%',background:'var(--gold)',borderRadius:'1px',width:`${(totalDone/TOTAL)*100}%`,transition:'width .6s var(--ease)'}}/></div>
            <span style={{fontFamily:'var(--f-mono)',fontSize:'8px',color:'rgba(255,255,255,.3)',letterSpacing:'.06em'}}>{totalDone}/{TOTAL}</span>
          </div>
        </div>
      </nav>
      <div style={{paddingTop:'var(--nav-h)'}}>
        {view==='catalog'&&<CatalogView completed={completed} onStartCourse={handleStartCourse}/>}
        {view==='lesson'&&activeCourse&&activeTrack&&<CourseLessonView key={activeCourse.id} course={activeCourse} track={activeTrack} completed={completed} onComplete={handleComplete} onFinishCourse={handleBack}/>}
        {view==='dashboard'&&<UnifiedDashboard completed={completed}/>}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
